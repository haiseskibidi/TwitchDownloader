<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Beautiful Twitch purple gradient -->
    <linearGradient id="twitch-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A970FF" />
      <stop offset="100%" stop-color="#6441A5" />
    </linearGradient>
    <!-- Subtle drop shadow to make it pop and look extremely premium -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>
  
  <!-- Outer Speech Bubble (Twitch Icon Shape) with shadow -->
  <path d="M 64 48 
           L 416 48 
           L 464 96 
           L 464 352 
           L 352 352 
           L 288 416 
           L 224 416 
           L 160 480 
           L 160 416 
           L 64 416 
           Z" 
        fill="url(#twitch-grad)" 
        filter="url(#shadow)" />
  
  <!-- Inner White Speech Bubble -->
  <path d="M 112 96 
           L 416 96 
           L 416 304 
           L 336 304 
           L 288 352 
           L 240 352 
           L 192 400 
           L 192 352 
           L 112 352 
           Z" 
        fill="#FFFFFF" />

  <!-- Download Arrow in the center (Twitch Purple) -->
  <g fill="#9146FF">
    <!-- Arrow shaft and head -->
    <path d="M 236 130 
             L 236 210 
             L 180 210 
             L 264 294 
             L 348 210 
             L 292 210 
             L 292 130 
             Z" />
    <!-- Bar under the arrow (Tray) -->
    <rect x="180" y="312" width="168" height="20" rx="6" />
  </g>
</svg>